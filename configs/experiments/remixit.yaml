# ==========================================
#  Experiment: RemixIT (Teacher-Student UDA)
#  Self-supervised domain adaptation via teacher-student
#  with noise remixing on target domain.
#  Paper reference: "RemixIT" row in Tables 1-3.
# ==========================================
#
# Usage:
#   python scripts/train.py \
#     batch_size=64 lr=5e-5 fs=16000 \
#     data_type=dns \
#     unsupervised=True teacher_update=True \
#     pretrained=True \
#     pretrained_ckpt=/path/to/supervised_source.ckpt \
#     pretrained_ckpt_2=/path/to/other_supervised.ckpt
#
# ==========================================

batch_size: 64
lr: 5e-5
fs: 16000

data_type: dns            # Target domain
source_domain: librispeech

unsupervised: True
teacher_update: True       # Periodically update teacher
alter_every: 20
pretrained: True           # Init student from supervised
use_other_weights: True    # Init teacher from different ckpt

# Set these to your checkpoint paths:
# pretrained_ckpt: ./models/supervised_librispeech/best.ckpt
# pretrained_ckpt_2: ./models/supervised_librispeech/second_best.ckpt
