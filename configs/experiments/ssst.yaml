# ==========================================
#  Experiment: SSST (Source-Supervised Self-Training)
#  RemixIT + supervised source samples for regularization.
#  Called SRST internally in the codebase.
#  Paper reference: "SSST" row in Tables 1-3.
# ==========================================
#
# Usage:
#   python scripts/train.py \
#     batch_size=64 lr=5e-5 fs=16000 \
#     data_type=dns \
#     unsupervised=True use_labeled=True \
#     pretrained=True teacher_update=True \
#     source_percent=0.3 reduce_from=2 reduce_amount=0.03 min_source=2 \
#     pretrained_ckpt=/path/to/supervised.ckpt \
#     pretrained_ckpt_2=/path/to/other_supervised.ckpt
#
# ==========================================

batch_size: 64
lr: 5e-5
fs: 16000

data_type: dns
source_domain: librispeech

unsupervised: True
teacher_update: True
pretrained: True
use_other_weights: True

# Source regularization
use_labeled: True          # Include pseudo-label-selected source samples
source_percent: 0.3        # Initial source fraction per batch
reduce_from: 2             # Start reducing after epoch 2
reduce_amount: 0.03        # Reduce by 3% each step
min_source: 2              # Minimum source samples to keep

# Set these to your checkpoint paths:
# pretrained_ckpt: ./models/supervised_librispeech/best.ckpt
# pretrained_ckpt_2: ./models/supervised_librispeech/second_best.ckpt
